name: Secret Scanner

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:
  push:
    paths:
      - 'repos.txt'

# Zero permissions at top level — each job declares only what it needs
permissions: {}

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Resolve newest TruffleHog release that is ≥ 3 days old
  # ─────────────────────────────────────────────────────────────────
  resolve-trufflehog-version:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version:  ${{ steps.pick.outputs.version }}
      checksum: ${{ steps.pick.outputs.checksum }}
    steps:
      - name: Pick newest release ≥ 3 days old
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          releases=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/trufflesecurity/trufflehog/releases?per_page=20")

          cutoff=$(date -u -d '3 days ago' '+%Y-%m-%dT%H:%M:%SZ')

          version=$(echo "$releases" \
            | jq -r --arg cutoff "$cutoff" \
              '[.[] | select(.prerelease == false and .draft == false and .published_at < $cutoff)]
               | sort_by(.published_at) | last | .tag_name' \
            | sed 's/^v//')

          echo "Resolved TruffleHog version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          checksum_url="https://github.com/trufflesecurity/trufflehog/releases/download/v${version}/trufflehog_${version}_checksums.txt"
          checksums=$(curl -fsSL "$checksum_url")

          checksum=$(echo "$checksums" \
            | grep "trufflehog_${version}_linux_amd64.tar.gz" \
            | awk '{print $1}')

          echo "Expected SHA256: $checksum"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Build repo matrix from repos.txt
  # ─────────────────────────────────────────────────────────────────
  load-repos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from repos.txt
        id: set-matrix
        run: |
          repos=$(grep -v '^\s*#' repos.txt | grep -v '^\s*$' | jq -R . | jq -cs .)
          echo "matrix={\"repo\":$repos}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Scan — one isolated job per repo, zero permissions
  # ─────────────────────────────────────────────────────────────────
  scan:
    needs: [resolve-trufflehog-version, load-repos]
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-repos.outputs.matrix) }}

    steps:
      - name: Sanitize repo name
        id: sanitize
        run: |
          repo="${{ matrix.repo }}"
          if [[ ! "$repo" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "ERROR: Repo name contains illegal characters: $repo"
            exit 1
          fi
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

      - name: Clear git credential state from any previous run
        run: |
          git config --global credential.helper ""
          git config --global --unset-all credential.helper || true

      - name: Install TruffleHog with checksum verification
        env:
          TH_VERSION:  ${{ needs.resolve-trufflehog-version.outputs.version }}
          TH_CHECKSUM: ${{ needs.resolve-trufflehog-version.outputs.checksum }}
        run: |
          set -euo pipefail
          tarball="trufflehog_${TH_VERSION}_linux_amd64.tar.gz"
          curl -fsSL \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v${TH_VERSION}/${tarball}" \
            -o "/tmp/${tarball}"

          echo "${TH_CHECKSUM}  /tmp/${tarball}" | sha256sum --check --strict
          echo "✅ Checksum verified"

          tar -xzf "/tmp/${tarball}" -C /tmp trufflehog
          chmod +x /tmp/trufflehog
          rm "/tmp/${tarball}"

      - name: Clone repo anonymously into isolated temp dir
        env:
          REPO: ${{ steps.sanitize.outputs.repo }}
        run: |
          set -euo pipefail
          SCAN_DIR=$(mktemp -d /tmp/scan-XXXXXXXX)
          echo "SCAN_DIR=$SCAN_DIR" >> "$GITHUB_ENV"

          # Anonymous HTTPS — no token, no auth, identical to an unauthenticated internet clone
          git clone "https://github.com/roebi/${REPO}.git" "${SCAN_DIR}/repo"

          # Sever all remote info — repo is now fully offline
          git -C "${SCAN_DIR}/repo" remote remove origin
          git -C "${SCAN_DIR}/repo" config --unset-all remote.origin.url || true
          echo "✅ Cloned and severed remote for ${REPO}"

      - name: Scan with TruffleHog (local file:// only, no network)
        id: scan
        env:
          REPO: ${{ steps.sanitize.outputs.repo }}
        run: |
          set -euo pipefail

          # Strip all tokens before TruffleHog runs — it cannot phone home with our credentials
          unset GITHUB_TOKEN GH_TOKEN GITHUB_ACTIONS CI
          export TRUFFLEHOG_NO_UPDATE=true

          RESULT_FILE="/tmp/th-results-${REPO}.json"

          /tmp/trufflehog git \
            "file://${SCAN_DIR}/repo" \
            --only-verified \
            --json \
            --no-update \
            > "$RESULT_FILE" 2>/dev/null || true

          FINDING_COUNT=$(grep -c '{' "$RESULT_FILE" 2>/dev/null || echo "0")

          if [ "$FINDING_COUNT" -gt "0" ]; then
            echo "result=FAIL:$FINDING_COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          fi

          echo "Findings for ${REPO}: $FINDING_COUNT"

      - name: Cleanup — always runs, removes all scan artefacts
        if: always()
        env:
          REPO: ${{ steps.sanitize.outputs.repo }}
        run: |
          [ -n "${SCAN_DIR:-}" ] && [ -d "${SCAN_DIR}" ] && rm -rf "${SCAN_DIR}" && echo "✅ Removed $SCAN_DIR"
          rm -f /tmp/trufflehog
          rm -f "/tmp/th-results-${REPO}.json"

      - name: Write job summary
        if: always()
        env:
          REPO: ${{ steps.sanitize.outputs.repo }}
        run: |
          echo "## 🔍 ${REPO}" >> "$GITHUB_STEP_SUMMARY"
          result="${{ steps.scan.outputs.result }}"
          if   [[ "$result" == FAIL* ]]; then
            echo "### ⚠️ ${result#FAIL:} verified finding(s) — private advisory created" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$result" == "PASS" ]]; then
            echo "### ✅ No verified secrets found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❓ Scan did not complete — check logs" >> "$GITHUB_STEP_SUMMARY"
          fi

    outputs:
      # Expose result per repo to the report job
      result: ${{ steps.scan.outputs.result }}

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Report — create PRIVATE DRAFT security advisory in THIS
  #         repo only. Never touches any scanned repo. Never creates
  #         a public issue. Only the maintainer (roebi) can see this.
  # ─────────────────────────────────────────────────────────────────
  report:
    needs: [load-repos, scan]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}   # GITHUB_TOKEN cannot create advisories — we use ADVISORY_PAT below
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADVISORY_PAT }}   # fine-grained PAT: only repo-secret-scanner, only repository_advisories:write

      - name: Create private draft security advisory for each finding
        uses: actions/github-script@v7
        with:
          # ADVISORY_PAT: fine-grained PAT scoped to repo-secret-scanner only
          # permission: repository_advisories: write
          # This creates a DRAFT advisory — invisible to everyone except the maintainer
          # It is NEVER published automatically by this workflow
          github-token: ${{ secrets.ADVISORY_PAT }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const scanOutputs = ${{ toJson(needs.scan.outputs) }};

            for (const [key, value] of Object.entries(scanOutputs)) {
              const repoName = key.replace(/^result_/, '');
              if (!value || !value.startsWith('FAIL')) continue;
              const count = value.split(':')[1] || '?';

              // Summary: only the short repo name — no "roebi/" prefix, no raw secret content
              const summary = `Secret scan finding: ${repoName} — ${count} verified secret(s)`;

              // Deduplicate: check if a draft advisory with this summary already exists
              const existing = await github.rest.securityAdvisories.listRepositoryAdvisories({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'draft'
              });
              if (existing.data.find(a => a.summary === summary)) {
                console.log(`Draft advisory already exists for ${repoName}, skipping.`);
                continue;
              }

              // Create a PRIVATE DRAFT advisory — only maintainer can see this
              await github.rest.securityAdvisories.createRepositoryAdvisory({
                owner: context.repo.owner,
                repo: context.repo.repo,
                summary,
                description: [
                  `TruffleHog detected **${count} verified** secret(s) in \`${repoName}\`.`,
                  ``,
                  `This advisory is a **private draft** and is not publicly visible.`,
                  ``,
                  `👉 [View scan run](${runUrl})`,
                  ``,
                  `**Immediate steps:**`,
                  `- [ ] Identify the secret type from the scan run logs`,
                  `- [ ] Rotate the exposed credential immediately at the provider`,
                  `- [ ] Revoke the old token`,
                  `- [ ] Remove from git history: \`git filter-repo --path <file> --invert-paths\``,
                  `- [ ] Force-push and contact GitHub Support to purge cached views`,
                  `- [ ] Close / dismiss this advisory when resolved`
                ].join('\n'),
                severity: 'high'
              });
              console.log(`Private draft advisory created for ${repoName}`);
            }
