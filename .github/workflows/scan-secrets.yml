name: Secret Scanner

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:       # Manual trigger anytime
  push:
    paths:
      - 'repos.txt'        # Re-scan when repo list changes

jobs:
  load-repos:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from repos.txt
        id: set-matrix
        run: |
          # Read repos.txt, skip comments and blank lines
          repos=$(grep -v '^\s*#' repos.txt | grep -v '^\s*$' | jq -R . | jq -cs .)
          echo "matrix={\"repo\":$repos}" >> "$GITHUB_OUTPUT"

  scan:
    needs: load-repos
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false      # Scan all repos even if one fails
      matrix: ${{ fromJson(needs.load-repos.outputs.matrix) }}

    permissions:
      contents: read
      issues: write         # For auto-creating issues on findings

    steps:
      - name: Checkout target repo (full history)
        uses: actions/checkout@v4
        with:
          repository: roebi/${{ matrix.repo }}
          fetch-depth: 0                         # Full git history = full scan
          token: ${{ secrets.SCAN_PAT }}         # PAT for private repos; public repos work without it

      - name: Run TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3.94.0  # Pin version - supply chain hygiene
        with:
          path: ./
          base: ""           # Scan entire history
          head: HEAD
          extra_args: >
            --only-verified
            --json
            --no-update
        continue-on-error: true   # Don't fail the job; we report manually below

      - name: Write job summary
        if: always()
        run: |
          echo "## 🔍 Secret Scan: roebi/${{ matrix.repo }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.trufflehog.outcome }}" = "failure" ]; then
            echo "### ⚠️ Findings detected" >> "$GITHUB_STEP_SUMMARY"
            echo "TruffleHog exited with findings. Review the step logs above." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ No verified secrets found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open issue on findings
        if: steps.trufflehog.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SCAN_PAT }}
          script: |
            const repo = '${{ matrix.repo }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 Secret scanner: potential leak in roebi/${repo}`;

            // Avoid duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['secret-leak']
            });
            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              console.log('Issue already open, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `TruffleHog detected **verified** secrets in \`roebi/${repo}\`.\n\n👉 [View scan run](${runUrl})\n\n**Immediate steps:**\n- [ ] Rotate the exposed credential\n- [ ] Revoke the old token\n- [ ] Remove from git history (\`git filter-repo\`)\n- [ ] Close this issue when resolved`,
              labels: ['secret-leak']
            });
